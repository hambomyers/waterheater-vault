name = "waterheater-vault"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "waterheater-vault"
database_id = "15010cce-24bc-450a-b49f-74d73b82ca38"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "waterheater-images"

# ── Cloudflare Workers AI ──
[ai]
binding = "AI"

# ── Environment variables — set in Cloudflare Pages → Settings → Environment Variables ──
# PRIMARY VISION API (REQUIRED):
# GEMINI_API_KEY           — Google Gemini 2.5 Flash-Lite (FREE tier: 1,500/day, then $0.0002/scan)
#                            Get key: https://aistudio.google.com/apikey
#                            Best balance of speed (2-3s), accuracy (95%+), and cost
#
# OPTIONAL BACKUP MODELS:
# GROK_API_KEY             — xAI Grok Vision (premium backup, $0.01/scan). console.x.ai
#
# OTHER SERVICES:
# BRAVE_API_KEY            — Brave Search for manual/warranty docs (optional). api.search.brave.com
# RESEND_API_KEY           — Email delivery (Resend). Send from: reports@waterheaterplan.com
# JWT_SECRET               — Sign/verify tokens (32+ chars)
# STRIPE_SECRET_KEY        — Stripe checkout sessions
# STRIPE_PRICE_ID_MONTHLY  — Stripe Price ID for $49/mo Pro plan
#
# ARCHITECTURE (Smart Scan + Self-Learning Flywheel):
# Tier 1: Pattern matching (D1 learned patterns, <100ms, $0) — grows to 85%+ hit rate
# Tier 2: Gemini 2.5 Flash-Lite (2-3s, $0.0002) — learns patterns for Tier 1
# Self-improving: Every scan updates pattern database → costs approach $0 over time
# Target: Month 1 = $0.20, Month 6 = $1.00, Year 1 = $20 (for 100K scans)
