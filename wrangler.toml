name = "waterheater-vault"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

# D1 binding for lead capture — set up with:
#   wrangler d1 create waterheater-vault
#   wrangler d1 execute waterheater-vault --file=./migrations/0002_leads.sql
# Then paste the database_id below and uncomment:
# [[d1_databases]]
# binding = "DB"
# database_name = "waterheater-vault"
# database_id = "<paste-id-from-wrangler-d1-create>"
#
# Also set in Cloudflare Pages → Settings → Environment Variables:
#   RESEND_API_KEY = <your Resend API key>
#   (send from: reports@waterheaterplan.com — verify domain in Resend first)
