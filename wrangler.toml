name = "waterheater-vault"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "waterheater-vault"
database_id = "15010cce-24bc-450a-b49f-74d73b82ca38"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "waterheater-images"

# ── Cloudflare Workers AI ──
[ai]
binding = "AI"

# ── Environment variables — set in Cloudflare Pages → Settings → Environment Variables ──
# VISION API (REQUIRED):
# GEMINI_API_KEY           — Google Gemini 2.5 Flash-Lite
#                            FREE tier: 2M tokens/day (≈10,000 scans/day)
#                            Paid tier: $0.075 per 1M tokens after free tier
#                            Get key: https://aistudio.google.com/apikey
#                            Speed: 2-3 seconds per scan
#                            Accuracy: 95%+ on water heater labels
#                            Also used for: Pro GBP review screening
#
# OTHER SERVICES:
# BRAVE_API_KEY            — Brave Search for manual/warranty docs (optional)
# RESEND_API_KEY           — Email delivery (Resend)
# JWT_SECRET               — Sign/verify tokens (32+ chars)
# STRIPE_SECRET_KEY        — Stripe checkout sessions
# STRIPE_PRICE_ID_MONTHLY  — Stripe Price ID for $49/mo Pro plan
#
# ARCHITECTURE:
# Single-tier Gemini vision for all scans
# Self-learning: Every scan updates D1 pattern database for future improvements
# Cost target: $0 for first 10K scans/day (free tier), then ~$0.01 per scan
