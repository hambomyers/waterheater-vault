name = "waterheater-vault"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "waterheater-vault"
database_id = "15010cce-24bc-450a-b49f-74d73b82ca38"

# ── Environment variables — set ALL in Cloudflare Pages → Settings → Environment Variables ──
# RESEND_API_KEY        — email delivery (Resend). Send from: reports@waterheaterplan.com
# GROK_API_KEY          — xAI Grok Vision (Tier 2 fallback only). console.x.ai
# GOOGLE_VISION_API_KEY — Google Cloud Vision Text Detection (Tier 0, 1000 free/month). console.cloud.google.com → APIs → Cloud Vision API → Credentials
# OPENROUTER_API_KEY    — OpenRouter free VLMs (Tier 1, Qwen-VL etc). openrouter.ai/keys
# BRAVE_API_KEY         — Brave Search for doc URL enrichment. api.search.brave.com
