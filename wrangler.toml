name = "waterheater-vault"
pages_build_output_dir = "out"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "waterheater-vault"
database_id = "15010cce-24bc-450a-b49f-74d73b82ca38"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "waterheater-images"

# ── Environment variables — set in Cloudflare Pages → Settings → Environment Variables ──
# PARALLEL FIRING SQUAD (primary scan method) - WORKS OUT OF THE BOX:
# Uses Hugging Face Inference API (FREE, no API keys required):
#   - llava-v1.6-mistral-7b-hf (1.5x weight)
#   - bakllava-v1-hf (1.0x weight)
#   - moondream2 (1.0x weight)
#
# OPTIONAL PREMIUM MODELS (add API keys to enable):
# GEMINI_API_KEY           — Google Gemini 2.0 Flash (free tier, fast). aistudio.google.com
# GROQ_API_KEY             — Groq Llama 3.2 90B Vision (free tier, blazing). console.groq.com
# OPENAI_API_KEY           — OpenAI GPT-4o-mini ($0.00015/image). platform.openai.com
# MISTRAL_API_KEY          — Mistral Pixtral 12B (free tier). console.mistral.ai
# GROK_API_KEY             — xAI Grok 4.20 (premium backup, 2x weight). console.x.ai
#
# OTHER SERVICES:
# BRAVE_API_KEY            — Brave Search for manual/warranty docs (optional). api.search.brave.com
# RESEND_API_KEY           — Email delivery (Resend). Send from: reports@waterheaterplan.com
# JWT_SECRET               — Sign/verify tokens (32+ chars)
# STRIPE_SECRET_KEY        — Stripe checkout sessions
# STRIPE_PRICE_ID_MONTHLY  — Stripe Price ID for $49/mo Pro plan
#
# ARCHITECTURE (Parallel Firing Squad):
# Primary: 3 FREE Hugging Face models (no keys) → weighted consensus → 1-3s, $0
# Optional: Add premium models above for higher accuracy
# Fallback 1: Pattern matching (D1 learned patterns, <100ms, $0)
# Fallback 2: Text-only LLM (grok-2-1212, ~1-2s, cheap)
# Offline: On-device Tesseract OCR only
